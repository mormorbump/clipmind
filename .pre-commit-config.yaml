# pre-commit フック設定
# 順序: fix → format → lint → type → security
# 実行: `uv run pre-commit run --all-files` / コミット時自動
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # mypy は pre-commit の隔離環境では import を解決しきれないため
  # ローカル + CI では `uv run mypy src` で実行する.
  # pre-commit からは外し、push 前の手動 / CI に委ねる.
  - repo: local
    hooks:
      - id: mypy-uv
        name: mypy (uv run)
        entry: uv run mypy src
        language: system
        types: [python]
        pass_filenames: false
        files: ^src/

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.6
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml"]
        additional_dependencies: ["bandit[toml]"]
        files: ^src/

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        # alembic/versions: revision id の hex がエントロピー検知に誤検知されるため除外
        exclude: ^(\.context/|docs/|uv\.lock|\.secrets\.baseline|alembic/versions/)
