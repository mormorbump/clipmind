# Phase 0: ローカル開発用の依存サービス
# - 3 サービスすべて healthy になれば DoD 達成
# - データは ./.docker/<service>/ に bind mount（.gitignore 済み）
# - `docker compose down` ではデータ保持、完全リセットは `rm -rf .docker/`
services:
  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: clipmind-qdrant
    ports:
      - "6333:6333"  # REST
      - "6334:6334"  # gRPC
    volumes:
      - ./.docker/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: clipmind-redis
    ports:
      - "6379:6379"
    volumes:
      - ./.docker/redis:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    container_name: clipmind-postgres
    environment:
      POSTGRES_USER: clipmind
      POSTGRES_PASSWORD: clipmind
      POSTGRES_DB: clipmind
    ports:
      - "5432:5432"
    volumes:
      - ./.docker/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "clipmind", "-d", "clipmind"]
      interval: 5s
      timeout: 3s
      retries: 10
