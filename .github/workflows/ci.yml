name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      qdrant:
        image: qdrant/qdrant:v1.12.1
        ports:
          - 6333:6333
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: clipmind  # pragma: allowlist secret
          POSTGRES_PASSWORD: clipmind  # pragma: allowlist secret
          POSTGRES_DB: clipmind
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U clipmind -d clipmind"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://clipmind:clipmind@localhost:5432/clipmind  # pragma: allowlist secret

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Pin Python
        run: uv python install 3.11

      # fastembed (bge-small / bm25) のモデルを CI 間でキャッシュ
      - name: Cache fastembed models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: fastembed-models-v1

      - name: Sync deps
        run: uv sync --all-extras --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy strict
        run: uv run mypy src

      - name: Alembic migrate
        run: uv run alembic upgrade head

      - name: Pytest (unit)
        run: uv run pytest -m "not integration and not e2e"

      - name: Pytest (integration)
        run: uv run pytest -m integration
